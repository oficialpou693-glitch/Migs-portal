<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MigWeb</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; /* Preto quase absoluto */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Estilo do Logo */
        .logo {
            font-size: 4.5rem;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: -2px;
            user-select: none;
        }
        .logo span {
            font-weight: 600;
            color: #555555; /* Tom de cinza para contraste minimalista */
        }

        /* Container da barra de pesquisa */
        .search-container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
        }
        .search-form {
            display: flex;
            width: 100%;
            position: relative;
        }

        /* Input (Barra de pesquisa) */
        .search-input {
            width: 100%;
            padding: 16px 50px 16px 24px;
            font-size: 1.1rem;
            background-color: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 30px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-input::placeholder {
            color: #666666;
        }
        .search-input:focus {
            background-color: #1a1a1a;
            border-color: #555555;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.03);
        }

        /* Botão de lupa */
        .search-button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background-color: transparent;
            border: none;
            color: #666666;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-button:hover {
            color: #ffffff;
        }
        .search-button svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* Rodapé sutil */
        .footer {
            position: absolute;
            bottom: 24px;
            font-size: 0.85rem;
            color: #333333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="logo">Mig<span>Web</span></div>

    <div class="search-container">
        <form class="search-form" action="https://duckduckgo.com/" method="GET">
            <input type="text" name="q" class="search-input" placeholder="Pesquise na web..." autocomplete="off" autofocus required>
            <button type="submit" class="search-button" aria-label="Pesquisar">
                <svg viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
            </button>
        </form>
    </div>

    <div class="footer">O BÁSICO DA WEB</div>

</body>
</html>

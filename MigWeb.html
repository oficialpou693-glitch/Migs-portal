<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MigWeb | Engine</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .logo { font-size: 3rem; margin-bottom: 20px; font-weight: bold; }
        .logo span { color: #444; }
        
        .search-box { width: 80%; max-width: 600px; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 25px; border: 1px solid #333; background: #111; color: #fff; outline: none; }
        button { padding: 10px 20px; border-radius: 25px; border: none; background: #333; color: #fff; cursor: pointer; }
        button:hover { background: #444; }

        #results { width: 80%; max-width: 600px; margin-top: 30px; }
        .result-item { margin-bottom: 25px; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .result-item a { color: #4a90e2; font-size: 1.2rem; text-decoration: none; }
        .result-item p { color: #888; font-size: 0.9rem; margin: 5px 0; }
        .no-results { color: #555; text-align: center; }
    </style>
</head>
<body>

    <div class="logo">Mig<span>Web</span></div>

    <div class="search-box">
        <input type="text" id="query" placeholder="O que deseja encontrar?" onkeyup="if(event.key==='Enter') search()">
        <button onclick="search()">Buscar</button>
    </div>

    <div id="results"></div>

    <script>
        // Este é o seu "Banco de Dados" (Index)
        // Em um search engine real, isso teria bilhões de linhas em um servidor
        const database = [
            { title: "YouTube", url: "https://www.youtube.com", desc: "Plataforma de compartilhamento de vídeos." },
            { title: "GitHub", url: "https://www.github.com", desc: "Hospedagem de código e projetos de software." },
            { title: "ChatGPT", url: "https://chat.openai.com", desc: "Inteligência artificial conversacional." },
            { title: "Notícias de Tecnologia", url: "https://www.g1.globo.com/tecnologia", desc: "Fique por dentro das novidades do mundo tech." },
            { title: "Stack Overflow", url: "https://stackoverflow.com", desc: "Comunidade de perguntas e respostas para programadores." },
            { title: "Canvas", url: "https://www.canva.com", desc: "Ferramenta de design gráfico online." }
        ];

        function search() {
            const query = document.getElementById('query').value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = ''; // Limpa resultados anteriores

            if (query === "") return;

            // Lógica do Algoritmo de Busca
            const filtered = database.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.desc.toLowerCase().includes(query)
            );

            if (filtered.length > 0) {
                filtered.forEach(item => {
                    resultsDiv.innerHTML += `
                        <div class="result-item">
                            <a href="${item.url}" target="_blank">${item.title}</a>
                            <p>${item.desc}</p>
                            <small style="color:#333">${item.url}</small>
                        </div>
                    `;
                });
            } else {
                resultsDiv.innerHTML = '<p class="no-results">Nenhum resultado encontrado no índice local.</p>';
            }
        }
    </script>
</body>
</html>
